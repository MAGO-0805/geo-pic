# 功能开关配置文件
# use_path_tracing: true=路径追踪, false=Whitted光线追踪
# direct_lighting: mis=BRDF+NEE多重重要性采样, brdf=纯BRDF采样, nee=纯NEE直接光照
# use_omp: true=OpenMP并行加速, false=单线程
# use_cuda: true=CUDA GPU加速, false=CPU渲染
#
# CUDA 模式说明:
#   - 支持全部材质: diffuse / reflective / refractive(含菲涅尔) / glossy / emissive
#   - 支持 direct_lighting 三种模式: mis / brdf / nee
#   - NEE 面光源采样仅支持球体(矩形暂未适配)
#   - 不支持 Whitted 光线追踪模式
#   - 其余特性与CPU版本一致

# use_smooth_shading: true=法向插值(平滑着色), false=面法向量(平面着色)
# use_gamma_correction: true=伽马校正, false=线性输出
# gamma: 校正系数, 标准sRGB=2.2, 越大暗部越亮
# use_dispersion: true=色散(折射材质随机波长追迹), false=关闭
use_path_tracing = true
direct_lighting = mis
use_omp = true
use_cuda = false
use_smooth_shading = false
use_gamma_correction = true
gamma = 2.2
use_dispersion = false
use_fresnel = false

# Path Guiding
use_path_guiding = true
path_guiding_iterations = 20
path_guiding_grid_res = 6
path_guiding_theta_bins = 4
path_guiding_phi_bins = 4

