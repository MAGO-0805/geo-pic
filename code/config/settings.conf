# 功能开关配置文件
# use_path_tracing: true=路径追踪, false=Whitted光线追踪
# direct_lighting: mis=BRDF+NEE多重重要性采样, brdf=纯BRDF采样, nee=纯NEE直接光照
# use_omp: true=OpenMP并行加速, false=单线程
# use_cuda: true=CUDA GPU加速, false=CPU渲染
#
# CUDA 模式说明:
#   - 支持全部材质: diffuse / reflective / refractive(含菲涅尔) / glossy / emissive
#   - 支持 direct_lighting 三种模式: mis / brdf / nee
#   - NEE 面光源采样仅支持球体(矩形暂未适配)
#   - 不支持 Whitted 光线追踪模式
#   - 其余特性与CPU版本一致

use_path_tracing = true
direct_lighting = nee
use_omp = true
use_cuda = true
